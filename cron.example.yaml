# CRONEX YAML Configuration Example
# This file demonstrates the YAML format for configuring cron jobs

# Example 1: Simple task that runs every 10 seconds
- name: memory-check
  cron: "*/10 * * * * *"
  cmd: powershell
  args:
    - -NoProfile
    - -NonInteractive
    - -Command
    - $mem = Get-CimInstance Win32_OperatingSystem; Write-Host ('Memory Usage: {0:N2}% ({1:N2} GB / {2:N2} GB)' -f (($mem.TotalVisibleMemorySize - $mem.FreePhysicalMemory) / $mem.TotalVisibleMemorySize * 100), (($mem.TotalVisibleMemorySize - $mem.FreePhysicalMemory) / 1MB), ($mem.TotalVisibleMemorySize / 1MB))
  enabled: true

# Example 2: Process count check every 30 seconds
- name: process-count
  cron: "*/30 * * * * *"
  cmd: powershell
  args:
    - -NoProfile
    - -NonInteractive
    - -Command
    - $count = (Get-Process).Count; Write-Host 'Running processes:' $count
  enabled: true

# Example 3: Hourly backup task
- name: hourly-backup
  cron: "0 0 * * * *"
  cmd: bash
  args:
    - -c
    - tar -czf backup-$(date +%Y%m%d-%H%M%S).tar.gz /path/to/data
  enabled: false

# Example 4: Daily task at 2 AM
- name: daily-cleanup
  cron: "0 0 2 * * *"
  cmd: bash
  args:
    - -c
    - find /tmp -type f -mtime +7 -delete
  enabled: false

# Example 5: Weekly task (Sunday at midnight)
- name: weekly-report
  cron: "0 0 0 * * 0"
  cmd: bash
  args:
    - -c
    - /usr/local/bin/generate-weekly-report.sh
  enabled: false
